# ============================================================
# Nginx Configuration — CRM Terreiro
# ============================================================
# Copie este arquivo para /etc/nginx/sites-available/crm-terreiro
# e crie um symlink:
#   ln -s /etc/nginx/sites-available/crm-terreiro /etc/nginx/sites-enabled/
# Depois teste e recarregue:
#   nginx -t && systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name crm.quimbanda.jp;

    # --- Descomente as linhas abaixo para HTTPS (recomendado) ---
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/crm.quimbanda.jp/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.quimbanda.jp/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    # # Redirecionar HTTP para HTTPS
    # if ($scheme = http) {
    #     return 301 https://$host$request_uri;
    # }

    # =====================================================
    # Root = raiz do projeto (NÃO public/)
    # Necessário porque as páginas legadas (dashboard.php,
    # filhos.php, api/*.php, etc.) estão na raiz.
    # =====================================================
    root /var/www/CRM-Terreiro;

    # IMPORTANTE: Apenas index.php — NÃO incluir index.html
    # para evitar conflito (index.html é a página legada estática)
    index index.php;

    charset utf-8;

    # Tamanho máximo de upload (para anexos de trabalhos)
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/crm-terreiro-access.log;
    error_log  /var/log/nginx/crm-terreiro-error.log;

    # =====================================================
    # 1. BLOQUEAR ACESSO A ARQUIVOS/DIRETÓRIOS SENSÍVEIS
    # =====================================================

    # Bloquear dotfiles (.env, .git, .gitignore, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Bloquear diretórios que NÃO devem ser acessíveis pela web
    location ^~ /app/        { deny all; return 404; }
    location ^~ /vendor/     { deny all; return 404; }
    location ^~ /database/   { deny all; return 404; }
    location ^~ /storage/    { deny all; return 404; }
    location ^~ /docs/       { deny all; return 404; }
    location ^~ /financeiro_app/ { deny all; return 404; }
    location ^~ /frontend/   { deny all; return 404; }
    location ^~ /node_modules/ { deny all; return 404; }

    # Bloquear arquivos sensíveis específicos na raiz
    location ~ ^/(composer\.(json|lock)|package\.json|tailwind\.config\.js|php\.ini|migrate\.php|dump_db\.php|backup\.php)$ {
        deny all;
        return 404;
    }

    # Bloquear debug/info em produção
    location = /public/debug.php { deny all; return 404; }
    location = /public/info.php  { deny all; return 404; }

    # =====================================================
    # 2. SERVIR ASSETS ESTÁTICOS (estão em public/)
    # =====================================================

    # CSS/JS compilados (Tailwind) — public/assets/
    location /assets/ {
        alias /var/www/CRM-Terreiro/public/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CSS/JS do Tabler + imagens — public/static/
    location /static/ {
        alias /var/www/CRM-Terreiro/public/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # =====================================================
    # 3. UPLOAD DE ARQUIVOS (storage/uploads)
    # =====================================================
    location /uploads/ {
        alias /var/www/CRM-Terreiro/storage/uploads/;
        expires 7d;
        try_files $uri =404;
    }

    # =====================================================
    # 4. PROCESSAR ARQUIVOS PHP
    # =====================================================
    location ~ \.php$ {
        # Segurança: não executar PHP em uploads
        location ~ ^/uploads/ {
            deny all;
            return 404;
        }

        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Ajuste o socket conforme sua versão do PHP
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        # Alternativa TCP: fastcgi_pass 127.0.0.1:9000;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeout para operações longas (backup, relatórios)
        fastcgi_read_timeout 300;

        # Buffers
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # =====================================================
    # 5. ROTEAMENTO PRINCIPAL (MVC + Legacy)
    # =====================================================
    # Ordem de prioridade:
    #   1. Arquivo estático existe? → Serve direto (CSS, JS, imagens)
    #   2. Arquivo PHP existe? → Executa (dashboard.php, api/clients.php)
    #   3. Nenhum match? → Envia para index.php (router MVC)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =====================================================
    # 6. HEADERS DE SEGURANÇA
    # =====================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
