<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Terreiro - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: { accent: '#6366f1' },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body class="bg-[#f8fafc] font-sans text-slate-900">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-lg p-8">
        <div class="mb-6 text-center">
          <div class="text-2xl font-bold text-accent">CRM Terreiro</div>
          <p class="text-slate-500 mt-2">Acesse seu painel</p>
        </div>
        <form class="space-y-4">
          <div>
            <label class="text-sm font-medium text-slate-700">Email</label>
            <input type="email" class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="voce@email.com" />
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Senha</label>
            <input type="password" class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="••••••••" />
          </div>
          <button type="button" class="w-full rounded-xl bg-accent py-3 text-white font-semibold hover:opacity-90">Entrar</button>
        </form>
        <div class="mt-6 text-center text-sm text-slate-500">
          <a href="dashboard.html" class="text-accent font-medium">Entrar direto</a>
        </div>
      </div>
    </div>
  </body>
</html>
