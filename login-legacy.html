<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Terreiro - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: { accent: '#6366f1' },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body class="bg-[#f8fafc] font-sans text-slate-900">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-lg p-8">
        <div class="mb-6 text-center">
          <div id="brandLogo" class="mx-auto h-12 w-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-accent font-bold">CT</div>
          <div class="text-2xl font-bold text-accent mt-3" id="brandName">CRM Terreiro</div>
          <p class="text-slate-500 mt-2">Acesse seu painel</p>
        </div>
        <form class="space-y-4">
          <div>
            <label class="text-sm font-medium text-slate-700">Email</label>
            <input type="email" class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="voce@email.com" />
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Senha</label>
            <input type="password" class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="••••••••" />
          </div>
          <a href="dashboard.html" class="block text-center w-full rounded-xl bg-accent py-3 text-white font-semibold hover:opacity-90">Entrar</a>
        </form>
      </div>
    </div>
    <script>
      const loadBrand = async () => {
        const response = await fetch('settings.php?action=get', { cache: 'no-store' });
        const data = await response.json();
        if (data.ok && data.data?.company_name) {
          document.getElementById('brandName').textContent = data.data.company_name;
        }
        if (data.ok && data.data?.logo_path) {
          document.getElementById('brandLogo').innerHTML = `<img src="${data.data.logo_path}" class="h-12 w-12 rounded-2xl object-cover" />`;
        }
      };

      loadBrand();
    </script>
  </body>
</html>
