; Configurações PHP Personalizadas para CRM-Terreiro
; Tenta habilitar drivers de banco de dados comuns
extension=pdo_mysql
extension=mysqli
extension=pdo_sqlite

; Configurações de Upload (Otimizadas para o sistema)
upload_max_filesize = 10M
post_max_size = 12M
memory_limit = 256M
max_execution_time = 300

; Exibir erros (Recomendado: Off em produção, On para debug)
display_errors = Off
log_errors = On
